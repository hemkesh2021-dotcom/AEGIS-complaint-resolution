name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0          # scan full history, not just the last commit
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  api:
    name: Build & test API (Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        run: mvn -B -e clean package

  classifier:
    name: Check classifier (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: classifier
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Install deps & syntax-check
        run: |
          pip install -r requirements.txt
          python -m py_compile main.py

  images:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [ api, classifier ]
    steps:
      - uses: actions/checkout@v7
      - name: Build API image
        run: docker build -t aegis-api ./api
      - name: Build classifier image
        run: docker build -t aegis-classifier ./classifier

